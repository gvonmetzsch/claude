name: Electrical Industry Digest

# Quarterly digest of electrical-industry research reports from middle-market
# investment banks (FMI, Cascade Partners, Baird, Harris Williams, ...).
#
# Send dates are HARDCODED in generate_digest.py (DIGEST_SEND_DATES):
# Mar 1, Jun 1, Sep 1, Dec 1 — fixed calendar dates, never relative to a
# previous run or test send. Keep this cron in sync with those dates: it
# fires DAILY from each date through its 20-day grace window, and the
# script's guards (send-window check + sent-this-quarter Gmail dedup)
# collapse the ticks into exactly one send. Even a 90% drop rate leaves
# ~2 firing days, which is why GitHub's best-effort scheduler is fine here
# (unlike the daily briefing, which needs Cloud Scheduler).
#
# The dates sit ~2 months after each quarter closes because banks publish
# quarterly reports 3-10 weeks after quarter end:
#   Mar 1 -> Q4/H2 crop, Jun 1 -> Q1, Sep 1 -> Q2/H1, Dec 1 -> Q3.

on:
  schedule:
    - cron: "0 14 1-21 3,6,9,12 *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send a digest now, ignoring the quarterly window and send-dedup (reports already digested in a previous email are still skipped)"
        type: boolean
        default: false
      full_refresh:
        description: "Also ignore the manifest: re-digest every collectable report from scratch"
        type: boolean
        default: false

concurrency:
  group: report-digest
  cancel-in-progress: false

jobs:
  digest:
    name: Collect, digest, and deliver electrical industry reports
    runs-on: ubuntu-latest
    # Headroom for ~40 collector fetches + up to 18 PDF downloads + 18
    # sequential Claude calls; a runner kill would bypass all fail-soft handling.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: digest/requirements.txt

      - name: Install dependencies
        run: pip install -r digest/requirements.txt

      - name: Run digest generator
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          # Comma-separated recipient list. Unset -> gvonmetzsch@gmail.com only.
          # Add Tom + boss later: gh variable set DIGEST_RECIPIENTS -R gvonmetzsch/claude \
          #   --body "gvonmetzsch@gmail.com,tom@example.com,boss@example.com"
          DIGEST_RECIPIENTS:    ${{ vars.DIGEST_RECIPIENTS }}
          FORCE_SEND:           ${{ inputs.force_send }}
          FULL_REFRESH:         ${{ inputs.full_refresh }}
        run: python digest/generate_digest.py
