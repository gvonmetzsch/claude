name: Electrical Industry Digest

# Quarterly digest of electrical-industry research reports from middle-market
# investment banks (FMI, Cascade Partners, Baird, Harris Williams, ...).
#
# Trigger design: unlike the daily briefing (which needs Cloud Scheduler
# because GitHub's cron drops most ticks), a quarterly job tolerates GitHub's
# best-effort scheduler fine — the cron fires DAILY through the first three
# weeks of each digest month (Mar/Jun/Sep/Dec), and the script's guards
# (digest-month check + sent-this-quarter Gmail dedup) collapse all those
# ticks into exactly one send. Even a 90% drop rate leaves ~2 firing days.
#
# Digest months are offset from quarter ends because banks publish their
# quarterly reports ~3-10 weeks after the quarter closes:
#   Mar -> Q4/H2 crop, Jun -> Q1, Sep -> Q2/H1, Dec -> Q3.

on:
  schedule:
    - cron: "0 14 1-21 3,6,9,12 *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Send a digest now, ignoring the quarterly window and dedup"
        type: boolean
        default: false

concurrency:
  group: report-digest
  cancel-in-progress: false

jobs:
  digest:
    name: Collect, digest, and deliver electrical industry reports
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: digest/requirements.txt

      - name: Install dependencies
        run: pip install -r digest/requirements.txt

      - name: Run digest generator
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          # Comma-separated recipient list. Unset -> gvonmetzsch@gmail.com only.
          # Add Tom + boss later: gh variable set DIGEST_RECIPIENTS -R gvonmetzsch/claude \
          #   --body "gvonmetzsch@gmail.com,tom@example.com,boss@example.com"
          DIGEST_RECIPIENTS:    ${{ vars.DIGEST_RECIPIENTS }}
          FORCE_SEND:           ${{ inputs.force_send }}
        run: python digest/generate_digest.py
