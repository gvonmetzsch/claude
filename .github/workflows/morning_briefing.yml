name: Morning Briefing

# Fires every 15 minutes, 24/7. GitHub's scheduled triggers are best-effort and
# routinely delayed or dropped entirely under load — so instead of hand-placing
# per-timezone cron times (which leaves long gaps where a single dropped event
# means NO briefing that day), we run on a dense regular interval and let the
# Python script decide when to actually send.
#
# The script only sends when local time is inside the morning window
# (6:45 AM → 11:00 AM, see is_briefing_window) AND it hasn't already sent today
# (Gmail dedup). So:
#   - Exactly one email per day, regardless of how many runs fire.
#   - Works in ANY timezone automatically (no per-tz cron upkeep).
#   - The ~4h window means ~17 firings land inside it; GitHub can drop most of
#     them and one will still get through. The repo is PUBLIC, so the frequent
#     short no-op runs (which exit in seconds) cost nothing.

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min, 24/7; script gates the actual send
  workflow_dispatch:         # Manual trigger for testing
    inputs:
      force_send:
        description: "Send a test briefing now, ignoring the 6:45 AM window"
        type: boolean
        default: false

# Serialize runs: the many overlapping cron triggers must not run at once, or two
# could race the WHOOP rotating-refresh-token update and brick it. Queue, don't
# cancel, so a run mid-token-rotation isn't killed before it persists the new token.
concurrency:
  group: morning-briefing
  cancel-in-progress: false

jobs:
  briefing:
    name: Generate and deliver morning briefing
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: briefing/requirements.txt

      - name: Install dependencies
        run: pip install -r briefing/requirements.txt

      - name: Run briefing generator
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          BRAVE_SEARCH_API_KEY:   ${{ secrets.BRAVE_SEARCH_API_KEY }}
          WHOOP_CLIENT_ID:        ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET:    ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN:    ${{ secrets.WHOOP_REFRESH_TOKEN }}
          GH_SECRETS_PAT:         ${{ secrets.GH_SECRETS_PAT }}
          GOOGLE_KEEP_EMAIL:        ${{ secrets.GOOGLE_KEEP_EMAIL }}
          GOOGLE_KEEP_MASTER_TOKEN: ${{ secrets.GOOGLE_KEEP_MASTER_TOKEN }}
          FORCE_SEND:             ${{ inputs.force_send }}
        run: python briefing/generate_briefing.py
