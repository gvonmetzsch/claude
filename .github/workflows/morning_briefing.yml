name: Morning Briefing

# Triggered by an external Google Cloud Scheduler job that POSTs to the
# workflow_dispatch API on a regular interval, 24/7. (GitHub's own `schedule:`
# was best-effort and dropped ~95% of triggers, so it was removed — Cloud
# Scheduler fires reliably. If Cloud Scheduler ever stops, the briefing simply
# doesn't arrive; there is no other fallback by design.)
#
# The script only sends when local time is inside the morning window
# (6:45 AM → 11:00 AM, see is_briefing_window) AND it hasn't already sent today
# (Gmail dedup) — so exactly one email per day regardless of how many runs fire,
# in whatever timezone the primary Google Calendar is set to.
#
# Keep the Cloud Scheduler interval comfortably WIDER than GitHub's worst-case
# runner-allocation delay (minutes, and much longer during infra blips): the
# concurrency group below serializes runs, so if dispatches arrive faster than
# runners are granted, queued runs supersede/cancel each other and email a
# failure. Every ~30 min is a safe cadence; do NOT go back to every 10 min.

on:
  workflow_dispatch:         # Triggered by Google Cloud Scheduler (and manual tests)
    inputs:
      force_send:
        description: "Send a test briefing now, ignoring the 6:45 AM window"
        type: boolean
        default: false

# Serialize runs: the many overlapping cron triggers must not run at once, or two
# could race the WHOOP rotating-refresh-token update and brick it. Queue, don't
# cancel, so a run mid-token-rotation isn't killed before it persists the new token.
concurrency:
  group: morning-briefing
  cancel-in-progress: false

jobs:
  briefing:
    name: Generate and deliver morning briefing
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: briefing/requirements.txt

      - name: Install dependencies
        run: pip install -r briefing/requirements.txt

      - name: Run briefing generator
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          BRAVE_SEARCH_API_KEY:   ${{ secrets.BRAVE_SEARCH_API_KEY }}
          WHOOP_CLIENT_ID:        ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET:    ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN:    ${{ secrets.WHOOP_REFRESH_TOKEN }}
          GH_SECRETS_PAT:         ${{ secrets.GH_SECRETS_PAT }}
          GOOGLE_KEEP_EMAIL:        ${{ secrets.GOOGLE_KEEP_EMAIL }}
          GOOGLE_KEEP_MASTER_TOKEN: ${{ secrets.GOOGLE_KEEP_MASTER_TOKEN }}
          # Manual timezone override for travel (IANA name, e.g. Europe/London).
          # Set/clear via: gh variable set BRIEFING_TZ -R gvonmetzsch/claude --body "Europe/London"
          BRIEFING_TZ:            ${{ vars.BRIEFING_TZ }}
          FORCE_SEND:             ${{ inputs.force_send }}
        run: python briefing/generate_briefing.py
